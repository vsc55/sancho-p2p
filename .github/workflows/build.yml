name: Build

# Fast compile/package check on pushes and PRs to main, so regressions surface
# quickly. Full multi-OS packaging happens in the Release workflow (on tags), so
# this stays a single lightweight Linux build and skips release commits (which the
# Release workflow already builds) to avoid running twice for one push.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'appimage/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    if: ${{ !startsWith(github.event.head_commit.message, 'Release ') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # The pom's OS/arch profiles auto-select the SWT fragment; a Linux build is
      # enough as a regression guard (all three OSes are exercised in Release).
      - name: Build
        run: mvn -B -ntp clean package
